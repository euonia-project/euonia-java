server:
    port: 8166

spring:
    application:
        name: sample
    datasource:
        url: jdbc:h2:mem:linkyoudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password:
        jpa:
            hibernate:
                ddl-auto: update
            show-sql: true
        web:
            error:
                include-exception: true
                include-message: always
                include-binding-errors: always
                include-stacktrace: on-param
